# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name jungle-music-reserve.site www.jungle-music-reserve.site;
    return 301 https://$host$request_uri;
}

# HTTPS 서버
server {
    listen 443 ssl;
    server_name jungle-music-reserve.site www.jungle-music-reserve.site;

    ssl_certificate /etc/letsencrypt/live/jungle-music-reserve.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jungle-music-reserve.site/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # gzip 압축
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Admin API 요청을 admin-app으로 프록시
    location /api/admin/ {
        proxy_pass http://admin-app:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 40M;
    }

    # API 요청을 백엔드로 프록시
    location /api/ {
        proxy_pass http://user-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 40M;
    }

    # WebSocket 프록시 (STOMP/SockJS)
    location /ws/ {
        proxy_pass http://user-app:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # React Router 지원 (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 정적 파일 캐싱
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
