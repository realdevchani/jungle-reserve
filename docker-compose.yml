services:
  user-app:
    build:
      context: ./back/jungle
      dockerfile: Dockerfile
    container_name: jungle-user
    ports:
      - "8080:8080"
    environment:
      - APP_PROFILE=user
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
    restart: unless-stopped

  admin-app:
    build:
      context: ./back/jungle
      dockerfile: Dockerfile
    container_name: jungle-admin
    ports:
      - "8081:8081"
    environment:
      - APP_PROFILE=admin
      - DB_URL=${DB_URL}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
    restart: unless-stopped

  frontend:
    build:
      context: ./front/reserve
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${BACKEND_URL}
    container_name: jungle-frontend
    ports:
      - "3000:80"
    depends_on:
      - user-app
    restart: unless-stopped
