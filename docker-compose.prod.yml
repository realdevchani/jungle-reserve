services:
  backend:
    image: ${DOCKER_HUB_USERNAME}/jungle-reserve-backend:latest
    container_name: jungle-reserve-backend
    ports:
      - "12100:12100"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:mysql://mysql:3306/jungle_reserve?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - JPA_DDL_AUTO=update
      - JPA_SHOW_SQL=false
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    networks:
      - jungle-reserve-network

  frontend:
    image: ${DOCKER_HUB_USERNAME}/jungle-reserve-frontend:latest
    container_name: jungle-reserve-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - jungle-reserve-network

  mysql:
    image: mysql:8.0
    container_name: jungle-reserve-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=jungle_reserve
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - jungle-reserve-network

  redis:
    image: redis:7-alpine
    container_name: jungle-reserve-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - jungle-reserve-network

volumes:
  mysql-data:
  redis-data:

networks:
  jungle-reserve-network:
    driver: bridge
